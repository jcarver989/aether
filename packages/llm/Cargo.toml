[package]
name = "llm"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[features]
default = []
bedrock = ["dep:aws-config", "dep:aws-sdk-bedrockruntime", "dep:aws-smithy-types"]
oauth = ["dep:rmcp", "dep:oauth2", "dep:async-trait", "dep:keyring"]
codex = ["oauth", "dep:base64", "dep:url"]

[dependencies]
async-openai = { workspace = true }
async-stream = { workspace = true }
aws-config = { workspace = true, optional = true }
aws-sdk-bedrockruntime = { workspace = true, optional = true }
aws-smithy-types = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
chrono = { workspace = true }
eventsource-stream = { workspace = true }
reqwest = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }

tracing = { workspace = true }

utils = { path = "../utils" }

# OAuth/Codex deps
rmcp = { workspace = true, optional = true }
oauth2 = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
keyring = { workspace = true, optional = true }
url = { workspace = true, optional = true }

[build-dependencies]
llm-codegen = { path = "../llm-codegen" }

[dev-dependencies]
tempfile = { workspace = true }
