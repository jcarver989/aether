[package]
name = "aether-llm"
version = "0.1.0"
edition = "2024"
description = "Multi-provider LLM abstraction layer for the Aether AI agent framework"
license = "MIT"
repository = "https://github.com/contextbridge/aether"
readme = "README.md"
keywords = ["llm", "ai", "aether", "openai", "anthropic"]
categories = ["api-bindings", "asynchronous"]

[package.metadata.dist]
dist = false

[lib]
name = "llm"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = []
bedrock = ["dep:aws-config", "dep:aws-sdk-bedrockruntime", "dep:aws-smithy-types", "dep:base64"]
oauth = ["dep:rmcp", "dep:oauth2", "dep:async-trait", "dep:keyring"]
codex = ["oauth", "dep:base64", "dep:url"]

[dependencies]
async-openai = { workspace = true }
async-stream = { workspace = true }
aws-config = { workspace = true, optional = true }
aws-sdk-bedrockruntime = { workspace = true, optional = true }
aws-smithy-types = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
chrono = { workspace = true }
eventsource-stream = { workspace = true }
reqwest = { workspace = true }
futures = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }

serde = { workspace = true }
serde_json = { workspace = true }

tracing = { workspace = true }

utils = { package = "aether-utils", path = "../utils", version = "0.1.0" }

# OAuth/Codex deps
rmcp = { workspace = true, optional = true }
oauth2 = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
keyring = { workspace = true, optional = true }
url = { workspace = true, optional = true }

[build-dependencies]
llm-codegen = { package = "aether-llm-codegen", path = "../llm-codegen", version = "0.1.0" }

[dev-dependencies]
tempfile = { workspace = true }
