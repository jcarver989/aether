[package]
name = "aether-desktop"
version = "0.1.0"
authors = ["Josh Carver <jcarver989@gmail.com>"]
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Cross-platform dependencies
dioxus = { version = "0.7", features = ["router"] }
agent-client-protocol = "0.5.0"
uuid = { version = "1.10", features = ["v4", "js"] }
futures = "0.3"
async-trait = "0.1"
pulldown-cmark = "0.12"
syntect = { version = "5.2", default-features = false, features = ["default-syntaxes", "default-themes", "regex-fancy", "html", "parsing", "plist-load"] }
chrono = "0.4"
tracing = "0.1"
dioxus-logger = "0.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = { workspace = true }
regex = { workspace = true }
# Native-only MCP dependencies (requires tokio)
aether = { path = "../aether", default-features = false, optional = true }
rmcp = { workspace = true, features = ["transport-streamable-http-client-reqwest"], optional = true }

# Native-only dependencies (desktop feature)
tokio = { workspace = true, features = ["full"], optional = true }
tokio-util = { workspace = true, features = ["compat"], optional = true }
tokio-stream = { workspace = true, optional = true }
dirs = { version = "6.0", optional = true }
git2 = { version = "0.20", optional = true }
notify = { version = "8.2", optional = true }
notify-debouncer-mini = { version = "0.7", optional = true }
nucleo = { version = "0.5.0", optional = true }
ignore = { version = "0.4.25", optional = true }
aether-acp-client = { path = "../aether-acp-client", optional = true }
agent-events = { path = "../agent-events", optional = true }
aether-voice = { path = "../aether-voice", optional = true }

# Web-only dependencies
gloo-timers = { version = "0.3", optional = true }

[dev-dependencies]
tempfile = "3.14"
fantoccini = "0.21"

[features]
default = ["desktop"]
web = ["dioxus/web", "dep:gloo-timers"]
desktop = [
    "dioxus/desktop",
    "dep:tokio",
    "dep:tokio-util",
    "dep:tokio-stream",
    "dep:dirs",
    "dep:git2",
    "dep:notify",
    "dep:notify-debouncer-mini",
    "dep:nucleo",
    "dep:ignore",
    "dep:aether-acp-client",
    "dep:aether-voice",
    "dep:rmcp",
    "dep:aether",
]
mobile = ["dioxus/mobile"]
