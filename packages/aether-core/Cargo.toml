[package]
name = "aether-agent-core"
version = "0.1.5"
edition = "2024"
description = "A minimal Rust library for building AI agents with MCP tool integration"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["ai", "agent", "mcp", "llm", "async"]
categories = ["asynchronous", "api-bindings"]

[package.metadata.dist]
dist = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[lib]
name = "aether_core"
path = "src/lib.rs"

[dependencies]
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yml = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
async-openai = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true }
thiserror = { workspace = true }
agent-client-protocol = { workspace = true }
acp_utils = { package = "aether-acp-utils", path = "../acp-utils", default-features = false, version = "0.1.5" }
glob = { workspace = true }
regex = { workspace = true }
mcp_utils = { package = "aether-mcp-utils", path = "../mcp-utils", version = "0.1.5" }
llm = { package = "aether-llm", path = "../llm", version = "0.1.5" }
utils = { package = "aether-utils", path = "../utils", version = "0.1.5" }

[features]
testing = []

[dev-dependencies]
aether-core = { package = "aether-agent-core", path = ".", features = ["testing"] }
reqwest = { workspace = true }
tempfile = { workspace = true }

[[example]]
name = "basic_agent"
path = "examples/basic_agent.rs"
