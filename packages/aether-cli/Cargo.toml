[package]
name = "aether-agent-cli"
version = "0.3.2"
edition = "2024"
description = "CLI and ACP server for the Aether AI coding agent"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
homepage = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["ai", "agent", "cli", "acp", "coding"]
categories = ["command-line-utilities", "development-tools"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.dist]
formula = "aether"

[lints]
workspace = true

[lib]
name = "aether_cli"
path = "src/lib.rs"

[[bin]]
name = "aether"
path = "src/main.rs"

[dependencies]
aether-core = { package = "aether-agent-core", path = "../aether-core", version = "0.3.2" }
aether-project = { path = "../aether-project", version = "0.3.2" }
llm = { package = "aether-llm", path = "../llm", features = ["bedrock", "codex"], version = "0.2.5" }
mcp_utils = { package = "aether-mcp-utils", path = "../mcp-utils", version = "0.3.2" }
mcp-servers = { package = "aether-mcp-servers", path = "../mcp-servers", features = ["all"], version = "0.3.2" }
wisp = { package = "aether-wisp", path = "../wisp", version = "0.3.2" }
tui = { package = "aether-tui", path = "../tui", default-features = false, features = ["syntax"], version = "0.2.2" }
acp_utils = { package = "aether-acp-utils", path = "../acp-utils", features = ["server", "testing"], version = "0.3.2" }
agent-client-protocol = { workspace = true }
aether-lspd = { path = "../aether-lspd", version = "0.1.9" }
rmcp = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
futures = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }
tempfile = { workspace = true }
crossterm = { workspace = true }

[dev-dependencies]
acp_utils = { package = "aether-acp-utils", path = "../acp-utils", features = ["testing"], version = "0.3.2" }
