[package]
name = "aether-cli"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[lib]
name = "aether_cli"
path = "src/lib.rs"

[[bin]]
name = "aether"
path = "src/main.rs"

[dependencies]
aether-core = { path = "../aether-core" }
llm = { path = "../llm", features = ["bedrock", "codex"] }
mcp_utils = { path = "../mcp-utils" }
mcp-servers = { path = "../mcp-servers", features = ["all"] }
acp_utils = { path = "../acp-utils", features = ["server"] }
agent-client-protocol = { workspace = true }
rmcp = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
futures = { workspace = true }
dirs = { workspace = true }
