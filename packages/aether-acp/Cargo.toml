[package]
name = "aether-acp"
version = "0.1.0"
edition = "2024"

[lib]
name = "aether_acp"
path = "src/lib.rs"

[[bin]]
name = "aether-acp"
path = "src/main.rs"

[dependencies]
aether = { path = "../aether" }
agent-events = { path = "../agent-events" }
mcp_lexicon = { path = "../mcp-lexicon" }
mcp-coding = { path = "../mcp-coding" }
agent-client-protocol = "0.9.4"
rmcp = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = "0.1"
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
futures = { workspace = true }
dirs = "6.0"
