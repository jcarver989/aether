[package]
name = "aether-acp"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[lib]
name = "aether_acp"
path = "src/lib.rs"

[[bin]]
name = "aether-acp"
path = "src/main.rs"

[dependencies]
aether = { path = "../aether" }
llm = { path = "../llm" }
mcp_utils = { path = "../mcp-utils" }
mcp-coding = { path = "../mcp-coding" }
mcp-skills = { path = "../mcp-skills" }
mcp-subagents = { path = "../mcp-subagents" }
mcp-tasks = { path = "../mcp-tasks" }
acp_utils = { path = "../acp-utils", features = ["server"] }
agent-client-protocol = { workspace = true }
rmcp = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = "0.1"
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
futures = { workspace = true }
dirs = "6.0"
