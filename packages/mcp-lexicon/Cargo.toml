[package]
name = "mcp_lexicon"
version = "0.1.0"
edition = "2024"

[dependencies]
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
rmcp = { workspace = true, features = ["transport-streamable-http-client-reqwest"] }
schemars = { workspace = true }
chrono = { workspace = true }
serde_yaml = "0.9"
uuid = { workspace = true, features = ["serde"] }
aether = { path = "../aether" }
agent-events = { path = "../agent-events" }
mcp-coding = { path = "../mcp-coding" }
tracing = { workspace = true }
crucible = { path = "../crucible" }
clap = { workspace = true, features = ["env"] }
tracing-subscriber = { workspace = true, features = ["registry", "fmt", "json"] }
tracing-appender = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "mcp-lexicon"
path = "src/main.rs"
