[package]
name = "mcp_lexicon"
version = "0.1.0"
edition = "2024"

[dependencies]
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
rmcp = { workspace = true, features = ["transport-streamable-http-client-reqwest"] }
schemars = { workspace = true }
chrono = { workspace = true }
glob = { workspace = true }
globset = { workspace = true }
grep = { workspace = true }
ignore = { workspace = true }
regex = { workspace = true }
serde_yaml = "0.9"
uuid = { workspace = true, features = ["serde"] }
aether = { path = "../aether" }
tracing = { workspace = true }
crucible = { path = "../crucible" }
clap = { workspace = true, features = ["env"] }
tracing-subscriber = { workspace = true, features = ["registry", "fmt", "json"] }
tracing-appender = { workspace = true }
thiserror = { workspace = true }
lsp-types = { workspace = true }
aether-lspd = { path = "../aether-lspd" }
reqwest = { workspace = true }
htmd = "0.5"
url = "2.5"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "mcp-lexicon"
path = "src/main.rs"

[[example]]
name = "lsp_diagnostics"
path = "examples/lsp_diagnostics.rs"
