[package]
name = "mcp_lexicon"
version = "0.1.0"
edition = "2024"

[dependencies]
color-eyre = "0.6.3"
futures = "0.3.31"
serde = { version = "1.0.211", features = ["derive"] }
serde_json = "1.0.132"
tokio = { version = "1.40.0", features = ["full"] }
rmcp = { version = "^0.6.4", features = ["client", "server", "macros", "schemars", "transport-streamable-http-client-reqwest"] }
schemars = { version = "1.0", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
glob = "0.3"
globset = "0.4"
grep = "0.3.2"
ignore = "0.4"
regex = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
aether = { path = "../aether" }
tracing = "0.1.41"
crucible = { path = "../crucible" }
clap = { version = "4.5", features = ["derive", "env"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry", "fmt", "json"] }
tracing-appender = "0.2"

[dev-dependencies]
tempfile = "3.0"
async-trait = "0.1"

[[bin]]
name = "mcp-lexicon"
path = "src/main.rs"
