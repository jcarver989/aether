[package]
name = "aether-acp-utils"
version = "0.3.0"
edition = "2024"
description = "Agent Client Protocol (ACP) utilities for the Aether AI agent framework"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["acp", "aether", "agent", "protocol"]
categories = ["api-bindings", "asynchronous"]

[package.metadata.dist]
dist = false

[lib]
name = "acp_utils"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = ["client", "server"]
client = ["dep:thiserror", "dep:agent-client-protocol-tokio"]
server = ["dep:thiserror"]

[dependencies]
agent-client-protocol = { workspace = true }
agent-client-protocol-tokio = { workspace = true, optional = true }
futures = { workspace = true }
rmcp = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
mcp_utils = { package = "aether-mcp-utils", path = "../mcp-utils", version = "0.3.0" }
tokio = { workspace = true }
tracing = { workspace = true }
utils = { package = "aether-utils", path = "../utils", version = "0.2.0" }
async-trait = { workspace = true }

# Optional (feature-gated)
thiserror = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
serde_json = { workspace = true }
tempfile = { workspace = true }
