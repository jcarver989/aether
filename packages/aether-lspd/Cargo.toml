[package]
name = "aether-lspd"
version = "0.1.0"
edition = "2024"
description = "LSP daemon for sharing language servers across multiple agents"

[lib]
name = "aether_lspd"
path = "src/lib.rs"

[dependencies]
# Async runtime
tokio = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# CLI
clap = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["registry", "fmt", "json", "env-filter"] }

# UUID for client identification
uuid = { workspace = true }

# Hashing for socket paths
sha2 = { workspace = true }

# LSP types - shared with mcp-lexicon
lsp-types = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Unix-specific features (daemonization, signals)
[target.'cfg(unix)'.dependencies]
nix = { workspace = true, features = ["signal", "process", "fs"] }
libc = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "aether-lspd"
path = "src/main.rs"
