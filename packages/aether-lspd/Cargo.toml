[package]
name = "aether-lspd"
version = "0.1.8"
edition = "2024"
description = "LSP daemon for sharing language servers across multiple agents"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
homepage = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["lsp", "language-server", "aether", "agent"]
categories = ["development-tools"]

[package.metadata.dist]
dist = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
testing = ["dep:tempfile"]

[lints]
workspace = true

[lib]
name = "aether_lspd"
path = "src/lib.rs"

[dependencies]
# Async runtime
tokio = { workspace = true }
futures = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# CLI
clap = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["registry", "fmt", "json", "env-filter"] }

# UUID for client identification
uuid = { workspace = true }

# Hashing for socket paths
sha2 = { workspace = true }

# LSP types shared across Aether packages
lsp-types = { workspace = true }

# File watching
notify = { workspace = true }
globset = { workspace = true }
ignore = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Testing support (optional)
tempfile = { workspace = true, optional = true }

# Unix-specific features (daemonization, signals)
[target.'cfg(unix)'.dependencies]
nix = { workspace = true, features = ["signal", "process", "fs"] }
libc = { workspace = true }

[dev-dependencies]
aether-lspd = { path = ".", features = ["testing"] }
tempfile = { workspace = true }

[[bin]]
name = "aether-lspd"
path = "src/main.rs"
