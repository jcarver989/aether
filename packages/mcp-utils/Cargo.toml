[package]
name = "aether-mcp-utils"
version = "0.3.1"
edition = "2024"
description = "MCP client and server utilities for the Aether AI agent framework"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["mcp", "aether", "agent", "tools"]
categories = ["api-bindings", "asynchronous"]

[package.metadata.dist]
dist = false

[lib]
name = "mcp_utils"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = ["client"]
client = [
    "dep:llm",
    "llm/oauth",
    "dep:reqwest",
    "dep:thiserror",
    "dep:schemars",
    "rmcp/transport-streamable-http-client-reqwest",
    "rmcp/transport-child-process",
]

[dependencies]
futures = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true }
rmcp = { workspace = true }
tracing = { workspace = true }
utils = { package = "aether-utils", path = "../utils", version = "0.2.0" }

# client-only deps
llm = { package = "aether-llm", path = "../llm", optional = true, version = "0.2.4" }
serde_json = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
