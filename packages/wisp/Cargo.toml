[package]
name = "aether-wisp"
version = "0.1.5"
edition = "2024"
description = "A terminal UI for AI coding agents via the Agent Client Protocol (ACP)"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["tui", "ai", "agent", "acp", "terminal"]
categories = ["command-line-interface"]

[package.metadata.dist]
dist = false

[lib]
name = "wisp"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
acp_utils = { package = "aether-acp-utils", path = "../acp-utils", features = ["client"], version = "0.1.5" }
tui = { package = "aether-tui", path = "../tui", version = "0.1.5" }
utils = { package = "aether-utils", path = "../utils", version = "0.1.5" }
agent-client-protocol = { workspace = true }
base64 = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
mime_guess = { workspace = true }
ignore = { workspace = true }
url = { workspace = true }
unicode-width = { workspace = true }
serde = { workspace = true }
similar = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tui = { package = "aether-tui", path = "../tui", features = ["testing"], version = "0.1.5" }
tempfile = { workspace = true }
