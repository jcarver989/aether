[package]
name = "wisp"
version = "0.1.0"
edition = "2024"
description = "A terminal UI for AI coding agents via the Agent Client Protocol (ACP)"
license = "MIT"
repository = "https://github.com/contextbridge/aether"
readme = "README.md"
keywords = ["tui", "ai", "agent", "acp", "terminal"]
categories = ["command-line-interface"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[dependencies]
acp_utils = { path = "../acp-utils", features = ["client"] }
tui = { path = "../tui" }
utils = { path = "../utils" }
agent-client-protocol = { workspace = true }
base64 = { workspace = true }
tokio = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
mime_guess = { workspace = true }
ignore = { workspace = true }
url = { workspace = true }
unicode-width = { workspace = true }
serde = { workspace = true }
similar = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tui = { path = "../tui", features = ["testing"] }
tempfile = { workspace = true }
