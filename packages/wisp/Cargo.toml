[package]
name = "wisp"
version = "0.1.0"
edition = "2024"

[dependencies]
aether = { path = "../aether"}
mcp_lexicon = { path = "../mcp-lexicon"}
futures = "0.3.31"
tokio = { version = "1.40.0", features = ["full"] }
tokio-stream = "0.1"
serde_json = "1.0.132"
clap = { version = "4.0", features = ["derive"] }
tracing = "^0.1.41"
tracing-subscriber = { version = "^0.3.19", features = ["env-filter"] }
crossterm = { version = "0.29", features = ["event-stream"] }
