[package]
name = "mcp-servers"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[features]
default = ["coding", "skills", "tasks", "subagents"]
coding = [
    "dep:aether-lspd",
    "dep:futures",
    "dep:glob",
    "dep:globset",
    "dep:grep",
    "dep:ignore",
    "dep:regex",
    "dep:tracing",
    "dep:thiserror",
    "dep:lsp-types",
    "dep:reqwest",
    "dep:uuid",
    "dep:chrono",
    "dep:htmd",
    "dep:url",
]
skills = [
    "dep:serde_yml",
    "dep:tracing",
]
tasks = [
    "dep:chrono",
    "dep:thiserror",
]
subagents = [
    "coding",
    "skills",
    "tasks",
    "dep:aether-core",
    "dep:llm",
    "dep:futures",
    "dep:tracing",
    "dep:serde_yml",
]
survey = []
all = ["coding", "skills", "tasks", "subagents", "survey"]
stdio = ["coding", "skills", "tasks", "survey"]

[dependencies]
# Always required
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
clap = { workspace = true, features = ["env"] }
mcp_utils = { path = "../mcp-utils" }
aether-lspd = { path = "../aether-lspd", optional = true }
futures = { workspace = true, optional = true }
glob = { workspace = true, optional = true }
globset = { workspace = true, optional = true }
grep = { workspace = true, optional = true }
ignore = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
lsp-types = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
htmd = { workspace = true, optional = true }
url = { workspace = true, optional = true }

# skills feature
serde_yml = { workspace = true, optional = true }

# subagents feature
aether-core = { path = "../aether-core", optional = true }
llm = { path = "../llm", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
aether-lspd = { path = "../aether-lspd", features = ["testing"] }

[[bin]]
name = "mcp-servers-stdio"
path = "src/bin/stdio.rs"
required-features = ["stdio"]

[[example]]
name = "lsp_diagnostics"
path = "examples/lsp_diagnostics.rs"
required-features = ["coding"]
