[package]
name = "tui"
version = "0.1.0"
edition = "2024"
description = "A lightweight, composable terminal UI framework for building rich CLI applications"
license = "MIT"
repository = "https://github.com/contextbridge/aether"
keywords = ["tui", "terminal", "cli", "ui", "component"]
categories = ["command-line-interface"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = ["syntax", "markdown", "serde", "runtime", "picker", "diff"]

## Enable syntax highlighting via syntect.
## Required for: markdown code blocks, diff highlighting, loading .tmTheme files.
syntax = ["dep:syntect"]

## Enable markdown rendering (implies syntax).
markdown = ["syntax", "dep:pulldown-cmark"]

## Enable diff preview rendering with syntax highlighting (implies syntax).
diff = ["syntax"]

## Enable `to_json()` methods for form widgets.
serde = ["dep:serde_json"]

## Enable async terminal event handling via tokio.
runtime = ["dep:tokio"]

## Enable fuzzy search/picker in combobox.
picker = ["dep:nucleo"]

[dependencies]
crossterm = { workspace = true }
syntect = { workspace = true, optional = true }
pulldown-cmark = { workspace = true, optional = true }
nucleo = { workspace = true, optional = true }
unicode-width = { workspace = true }
serde_json = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
