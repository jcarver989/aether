[package]
name = "tui"
version = "0.1.0"
description = "TUI for aether"
authors = ["Josh Carver <jcarver989@gmail.com>"]
license = "MIT"
edition = "2024"

[dependencies]
tui-input = "*"
crossterm = { version = "0.28.1", features = ["event-stream"] }
futures = "0.3.31"
ratatui = { version = "0.29.0", features = ["unstable-rendered-line-info"] }
tokio = { version = "1.40.0", features = ["full"] }
color-eyre = "0.6.3"
aether = { path = "../aether"}