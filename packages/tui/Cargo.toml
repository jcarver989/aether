[package]
name = "aether-tui"
version = "0.1.8"
edition = "2024"
description = "A lightweight terminal UI rendering library for building rich CLI applications"
license = "MIT"
repository = "https://github.com/jcarver989/aether"
readme = "README.md"
keywords = ["tui", "terminal", "cli", "ui", "component"]
categories = ["command-line-interface"]

[package.metadata.dist]
dist = false

[lib]
name = "tui"
path = "src/lib.rs"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = ["syntax", "picker"]

## Enable syntax highlighting, markdown rendering, and diff previews via syntect.
syntax = ["dep:syntect", "dep:two-face", "dep:pulldown-cmark"]

## Enable fuzzy search/picker in combobox.
picker = ["dep:nucleo"]

## Enable test utilities (TestTerminal, assert_buffer_eq, render helpers).
testing = []

[dependencies]
crossterm = { workspace = true }
syntect = { workspace = true, optional = true }
two-face = { workspace = true, optional = true }
pulldown-cmark = { workspace = true, optional = true }
nucleo = { workspace = true, optional = true }
similar = { workspace = true }
unicode-width = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tui = { package = "aether-tui", path = ".", features = ["testing"] }
tempfile.workspace = true
crossterm = { workspace = true }
tokio = { workspace = true }
