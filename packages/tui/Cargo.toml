[package]
name = "tui"
version = "0.1.0"
edition = "2024"
description = "A lightweight, composable terminal UI framework for building rich CLI applications"
license = "MIT"
repository = "https://github.com/contextbridge/aether"
keywords = ["tui", "terminal", "cli", "ui", "component"]
categories = ["command-line-interface"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[features]
default = ["syntax", "runtime", "picker"]

## Enable syntax highlighting, markdown rendering, and diff previews via syntect.
syntax = ["dep:syntect", "dep:pulldown-cmark"]

## Enable async terminal event handling via tokio.
runtime = ["dep:tokio"]

## Enable fuzzy search/picker in combobox.
picker = ["dep:nucleo"]

## Enable test utilities (TestTerminal, assert_buffer_eq, render helpers).
testing = []

[dependencies]
crossterm = { workspace = true }
syntect = { workspace = true, optional = true }
pulldown-cmark = { workspace = true, optional = true }
nucleo = { workspace = true, optional = true }
unicode-width = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
tui = { path = ".", features = ["testing"] }
tempfile = { workspace = true }
crossterm = { workspace = true }
