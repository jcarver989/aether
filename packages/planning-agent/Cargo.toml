[package]
name = "planning-agent"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
mcp_utils = { path = "../mcp-utils" }
mcp-servers = { path = "../mcp-servers", features = ["coding"] }
crucible = { path = "../crucible" }
aether-core = { path = "../aether-core" }
utils = { path = "../utils" }
llm = { path = "../llm" }

rmcp = { workspace = true }

# CLI
clap = { workspace = true }

# Async runtime
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Logging and tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
regex = { workspace = true }

[[bin]]
name = "evals"
path = "src/main.rs"

[[bin]]
name = "gen-eval"
path = "src/gen_eval.rs"

[dev-dependencies]
