[package]
name = "planning-agent"
version = "0.1.0"
edition = "2024"

[dependencies]
mcp_lexicon = { path = "../mcp-lexicon" }
crucible = { path = "../crucible" }
aether = { path = "../aether" }

# CLI
clap = { workspace = true }

# Async runtime
tokio = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }

# Logging and tracing
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[[bin]]
name = "evals"
path = "src/main.rs"

[[bin]]
name = "gen-eval"
path = "src/gen_eval.rs"

[dependencies.reqwest]
version = "0.13"
features = ["json"]

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_json]
version = "1.0"

[dependencies.anyhow]
version = "1.0"

[dependencies.regex]
version = "1.12"

[dev-dependencies]
