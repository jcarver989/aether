[package]
name = "aether-bin"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[lib]
name = "aether_bin"
path = "src/lib.rs"

[[bin]]
name = "aether-acp"
path = "src/main.rs"

[[bin]]
name = "aether"
path = "src/bin/aether.rs"

[dependencies]
aether = { path = "../aether" }
llm = { path = "../llm" }
mcp_utils = { path = "../mcp-utils" }
mcp-servers = { path = "../mcp-servers", features = ["all"] }
acp_utils = { path = "../acp-utils", features = ["server"] }
agent-client-protocol = { workspace = true }
rmcp = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
futures = { workspace = true }
dirs = { workspace = true }
