[package]
name = "crucible"
version = "0.1.0"
edition = "2024"

[dependencies]
# CLI
clap = { version = "4.5", features = ["derive"] }

# Colored output
owo-colors = "4.0"

# Async runtime
tokio = { version = "1.40.0", features = ["full"] }
futures = "0.3.31"

# Serialization
serde = { version = "1.0.211", features = ["derive"] }
serde_json = "1.0.132"

# Logging and tracing
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"

# Error handling
color-eyre = "0.6.3"

# Date and time
chrono = "0.4"

# File system
tempfile = "3.0"

# Internal dependencies
aether = { path = "../aether" }

[lib]
name = "crucible"
path = "src/lib.rs"
