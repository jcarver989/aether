<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crucible Eval Report</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Crucible Eval Report</h1>
            <div class="summary-stats" id="summary-stats">
                <!-- Populated by JavaScript -->
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Evaluations</h2>
                    <input type="text" id="search-input" placeholder="Search traces..." class="search-input">
                </div>
                <div class="eval-list" id="eval-list">
                    <!-- Populated by JavaScript -->
                </div>
            </aside>

            <!-- Main Panel -->
            <main class="main-panel">
                <div class="empty-state" id="empty-state">
                    <p>Select an evaluation from the sidebar to view traces</p>
                </div>
                <div class="eval-details" id="eval-details" style="display: none;">
                    <!-- Populated by JavaScript -->
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
