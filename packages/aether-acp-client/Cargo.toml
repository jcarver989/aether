[package]
name = "aether-acp-client"
version = "0.1.0"
authors = ["Josh Carver <jcarver989@gmail.com>"]
edition = "2024"

[dependencies]
# ACP protocol
agent-client-protocol = "0.5.0"

# Docker support
bollard = "0.18.1"
bytes = "1.9"
dirs = "6.0"
hex = "0.4"
tar = "0.4"

# Async runtime
tokio = { workspace = true }
tokio-util = { workspace = true, features = ["compat", "io"] }
futures = { workspace = true }

# Utilities
tracing = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }
uuid = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", default-features = false, features = ["signal"] }
