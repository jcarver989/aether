[package]
name = "aether"
version = "0.1.0"
edition = "2024"
description = "Claude Code esque coding agent"
authors = ["Josh Carver <jcarver989@gmail.com>"]
build = "build.rs"


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
better-panic = "0.3.0"
clap = { version = "4.5.20", features = [
    "derive",
    "cargo",
    "wrap_help",
    "unicode",
    "string",
    "unstable-styles",
] }
color-eyre = "0.6.3"
config = "0.14.0"
crossterm = { version = "0.28.1", features = ["serde", "event-stream"] }
derive_deref = "1.1.1"
directories = "5.0.1"
futures = "0.3.31"
human-panic = "2.0.2"
json5 = "0.4.1"
lazy_static = "1.5.0"
libc = "0.2.161"
ratatui = { version = "0.29.0", features = ["serde", "macros"] }
tui-scrollview = "0.5.1"
serde = { version = "1.0.211", features = ["derive"] }
serde_json = "1.0.132"
signal-hook = "0.3.17"
strip-ansi-escapes = "0.2.0"
strum = { version = "0.26.3", features = ["derive"] }
tokio = { version = "1.40.0", features = ["full"] }
tokio-stream = "0.1"
tokio-util = "0.7.12"
tracing = "0.1.40"
tracing-error = "0.2.0"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "serde"] }
chrono = "0.4"
async-openai = { version = "0.29", features = ["byot"] }
async-stream = "0.3"
async-trait = "0.1"
rmcp = { version = "0.3.0", features = ["client", "server", "macros", "schemars", "transport-streamable-http-client", "reqwest"] }
schemars = "1.0"
reqwest = { version = "0.12", features = ["json"] }
indexmap = "2.0"

[dev-dependencies]
tempfile = "3.8"
pretty_assertions = "1.4.1"

[build-dependencies]
anyhow = "1.0.90"
vergen-gix = { version = "1.0.2", features = ["build", "cargo"] }
