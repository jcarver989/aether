repos:
  - repo: local
    hooks:
      - id: doctoc
        name: doctoc README
        entry: bash -c 'npx doctoc "$@" --github --notitle && git add -u "**/README.md"' --
        language: system
        files: README\.md$
        pass_filenames: true
        stages: [pre-commit]

      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'PKG_FLAGS=$(scripts/changed-packages "$@") && [ -n "$PKG_FLAGS" ] && cargo fmt --check $PKG_FLAGS || true' --
        language: system
        types: [rust]
        pass_filenames: true

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'PKG_FLAGS=$(scripts/changed-packages "$@") && [ -n "$PKG_FLAGS" ] && cargo clippy --all-targets --all-features $PKG_FLAGS -- -D warnings || true' --
        language: system
        types: [rust]
        pass_filenames: true
        stages: [pre-push]

      - id: cargo-test
        name: cargo nextest run
        entry: bash -c 'PKG_FLAGS=$(scripts/changed-packages "$@") && [ -n "$PKG_FLAGS" ] && cargo nextest run --all-features $PKG_FLAGS || true' --
        language: system
        types: [rust]
        pass_filenames: true
        stages: [pre-push]
