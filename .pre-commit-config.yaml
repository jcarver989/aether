repos:
  - repo: local
    hooks:
      - id: doctoc
        name: doctoc README
        entry: bash -c 'npx doctoc "$@" --github --notitle && git add -u "**/README.md"' --
        language: system
        files: README\.md$
        pass_filenames: true
        stages: [pre-push]

      - id: fmt-check
        name: just fmt-check
        entry: scripts/run-check fmt-check
        language: system
        types: [rust]
        pass_filenames: true
        stages: [pre-commit]

      - id: fmt-check-full
        name: just fmt-check (full)
        entry: just fmt-check
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: lint
        name: just lint
        entry: just lint
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: test
        name: just test
        entry: just test
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: doc-check
        name: just doc-check
        entry: just doc-check
        language: system
        pass_filenames: false
        stages: [pre-push]
